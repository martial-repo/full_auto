name: 🐛 Bug Report
description: Report a bug found during QA or production usage.
title: "[BUG] "
labels:
  - "type:bug"
  - "phase:todo"
  - "priority:high"
body:
  - type: markdown
    attributes:
      value: |
        ## 🐛 Bug Report
        Bugs found during **QA validation** are treated as blocking issues on the current sub-issue PR.
        Bugs found in **production** are treated as high-priority sub-issues on the relevant epic.

  - type: input
    id: related_issue
    attributes:
      label: 🔗 Related Issue / PR
      description: Which issue or PR is this bug related to?
      placeholder: "Found during QA of #42 / PR #55"
    validations:
      required: false

  - type: textarea
    id: description
    attributes:
      label: 📝 Bug Description
      description: What is the bug? Be specific.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 🔄 Steps to Reproduce
      placeholder: |
        1. Go to ...
        2. Click on ...
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: ✅ Expected Behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: ❌ Actual Behavior
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: 🔥 Severity
      options:
        - "Critical (system broken)"
        - "High (feature broken)"
        - "Medium (workaround exists)"
        - "Low (cosmetic)"
      default: 1
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: 🌍 Environment / Context
      placeholder: "Browser, OS, version, environment (dev/staging/prod)"
    validations:
      required: false
